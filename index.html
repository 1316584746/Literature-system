<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>四川大学儿科睡眠科室文献管理系统</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            hospitalBlue: '#0066B3',
            hospitalLight: '#E6F1FB',
            hospitalGray: '#F4F7FA',
            hospitalText: '#23374D'
          },
          fontFamily: {
            medical: ['Microsoft YaHei', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: "Microsoft YaHei"; background: #F4F7FA; }
    .card-shadow { box-shadow: 0 2px 12px rgba(0, 102, 179, 0.08); }
    .table-hover tr:hover { background-color: #E6F1FB; transition: 0.2s; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #0066B3; border-radius: 3px; }
    .btn-normal{@apply px-3 py-1 rounded text-xs whitespace-nowrap}
  </style>
</head>
<body class="min-h-screen">
  <header class="bg-hospitalBlue text-white px-6 py-4 shadow-md">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-hospital-user text-2xl"></i>
        <h1 class="text-xl font-bold">四川大学儿科睡眠科室文献管理系统</h1>
      </div>
      <div class="text-sm opacity-9">科室共用｜上传自动去重｜本地永久存储</div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <!-- 第一行操作栏 -->
    <section class="bg-white rounded-lg p-6 card-shadow mb-6">
      <div class="grid md:grid-cols-4 gap-6 items-center">
        <div>
          <label class="block font-medium text-hospitalText mb-2">
            <i class="fa-solid fa-file-excel text-green-600 mr-2"></i>导入文献Excel
          </label>
          <input type="file" id="excelFile" accept=".xlsx,.xls" class="border border-gray-300 rounded px-3 py-2 w-full">
          <p class="text-xs text-gray-500 mt-1">依据unique_record_id自动去重，重复条目直接跳过</p>
        </div>
        <div>
          <label class="block font-medium text-hospitalText mb-2">
            <i class="fa-solid fa-magnifying-glass text-hospitalBlue mr-2"></i>标题模糊检索
          </label>
          <input id="searchInput" placeholder="输入文献标题任意关键词筛选..." class="border border-hospitalBlue rounded px-3 py-2 w-full focus:outline-none focus:ring-2 focus:ring-hospitalLight">
        </div>
        <div class="flex flex-col gap-2">
          <button onclick="downloadTemplate()" class="bg-green-600 text-white w-full py-2 rounded hover:bg-green-700">
            <i class="fa-solid fa-file-down mr-2"></i>下载导入模板
          </button>
          <button onclick="batchExportAllExcel()" class="bg-indigo-500 text-white w-full py-2 rounded hover:bg-indigo-600">
            <i class="fa-solid fa-download mr-2"></i>批量导出全部文献
          </button>
        </div>
        <div class="flex items-end">
          <button onclick="clearAllData()" class="bg-red-500 text-white w-full py-2 rounded hover:bg-red-600">
            <i class="fa-solid fa-trash mr-2"></i>清空全部本地文献
          </button>
        </div>
      </div>
      <div id="tipBox" class="mt-4 hidden py-2 px-3 rounded"></div>
    </section>

    <!-- 文献列表区域 -->
    <section class="bg-white rounded-lg p-6 card-shadow">
      <div class="flex justify-between items-center mb-4 flex-wrap gap-3">
        <div class="flex items-center gap-4">
          <h2 class="font-bold text-hospitalText text-lg">科室文献总库 <span id="totalNum" class="text-hospitalBlue">(0篇)</span></h2>
          <!-- 分页每页条数选择 -->
          <div class="flex items-center gap-2">
            <span class="text-sm text-gray-600">每页显示：</span>
            <select id="pageSizeSelect" class="border border-gray-300 rounded px-2 py-1 text-sm">
              <option value="10">10条</option>
              <option value="20">20条</option>
              <option value="50">50条</option>
              <option value="100">100条</option>
            </select>
          </div>
          <!-- 批量导出选中 -->
          <button onclick="exportSelectedRows()" class="bg-hospitalBlue text-white px-3 py-1 rounded text-sm hover:bg-blue-700">
            <i class="fa-solid fa-file-excel mr-1"></i>批量下载选中文献
          </button>
        </div>
      </div>

      <div class="overflow-x-auto table-hover">
        <table class="w-full border-collapse text-sm w-full">
          <thead class="bg-hospitalLight">
            <tr>
              <th class="border border-gray-200 px-3 py-2 w-[5%] text-center">
                <input type="checkbox" id="checkAll" class="cursor-pointer">
              </th>
              <th class="border border-gray-200 px-3 py-2 text-left w-[12%]">唯一ID</th>
              <th class="border border-gray-200 px-3 py-2 text-left w-[43%]">文献标题 Title</th>
              <th class="border border-gray-200 px-3 py-2 w-[15%]">第一作者</th>
              <th class="border border-gray-200 px-3 py-2 w-[15%]">外部链接</th>
              <th class="border border-gray-200 px-3 py-2 w-[10%] text-center">操作</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="6" class="text-center py-10 text-gray-400">
                <i class="fa-solid fa-folder-open text-3xl block mb-2"></i>暂无文献，请上传Excel文件
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- 分页控件 -->
      <div class="flex justify-center items-center mt-4 gap-3" id="paginationBox">
        <button id="prevPage" class="px-3 py-1 border rounded hover:bg-gray-100 disabled:opacity-40">上一页</button>
        <span id="pageInfo" class="text-sm text-gray-600">第 1 页</span>
        <button id="nextPage" class="px-3 py-1 border rounded hover:bg-gray-100 disabled:opacity-40">下一页</button>
      </div>
    </section>
  </main>

  <footer class="mt-10 py-4 text-center text-gray-500 text-sm border-t">
    对接四川大学图书馆 lib.scu.edu.cn | 无数据库纯静态系统 | Vercel免费部署
  </footer>

  <script>
    const STORAGE_KEY = 'ped_dept_literature';
    let literatureList = [];
    let selectedIds = new Set();
    let currentPage = 1;
    let pageSize = 10;

    // 完整50列表头（与你上传的模板完全一致）
    const TEMPLATE_HEADERS = [
      'Final_FT_retrieval_order','original_order','unique_record_id','source_databases',
      'source_database_count','crossdb_dedup_method','PMID','PMCID','DOI',
      'Embase_Accession_Number','WoS_Accession_Number','Publication_Year','Title','Abstract',
      'Journal','First_Author','Language','Publication_Types','Keywords',
      'MeSH_or_Subject_Terms','Source_Search_IDs_or_Domains','Source_Domains_All',
      'Inferred_Evidence_Domains_All','Primary_Evidence_Domain','Initial_Relevance_Priority',
      'Identifier_URLs','Reviewer_A_decision','Reviewer_A_reason',
      'Reviewer_A_Evidence_Unit_or_Notes','Reviewer_B_decision','Reviewer_B_reason',
      'Reviewer_B_Evidence_Unit_or_Notes','three_class_agreement','binary_A','binary_B',
      'binary_agreement','conflict_type','decision_pair','FT_priority','FT_priority_rank',
      'FT_priority_label','Recommended_next_step','Final_TA_decision','Final_retrieve_decision',
      'Final_TA_basis','Final_TA_rule_code','Final_TA_reason','Final_TA_confidence',
      'Final_FT_priority_rank','Final_FT_priority_label'
    ];

    const excelFileDom = document.getElementById('excelFile');
    const searchDom = document.getElementById('searchInput');
    const tableBody = document.getElementById('tableBody');
    const tipBox = document.getElementById('tipBox');
    const totalNum = document.getElementById('totalNum');
    const pageSizeSelect = document.getElementById('pageSizeSelect');
    const checkAll = document.getElementById('checkAll');
    const prevPage = document.getElementById('prevPage');
    const nextPage = document.getElementById('nextPage');
    const pageInfo = document.getElementById('pageInfo');

    // 初始化
    window.onload = function () {
      const cacheData = localStorage.getItem(STORAGE_KEY);
      if (cacheData) {
        literatureList = JSON.parse(cacheData);
        renderTable();
        showMsg(`成功加载本地文献库，共${literatureList.length}篇`, 'text-green-600 bg-green-5');
      }
      pageSizeSelect.addEventListener('change', () => {
        pageSize = Number(pageSizeSelect.value);
        currentPage = 1;
        renderTable();
      })
      checkAll.addEventListener('change', toggleAllCheck);
      prevPage.addEventListener('click', ()=>{currentPage--; renderTable()});
      nextPage.addEventListener('click', ()=>{currentPage++; renderTable()});
    }

    // Excel导入+去重
    excelFileDom.addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;
      showMsg('正在解析Excel，自动校验重复文献...', 'text-hospitalBlue bg-hospitalLight');
      const reader = new FileReader();
      reader.onload = function (ev) {
        try {
          const buffer = new Uint8Array(ev.target.result);
          const workbook = XLSX.read(buffer, { type: 'array' });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const rawData = XLSX.utils.sheet_to_json(sheet);
          const newBatch = rawData.map(item => ({
            id: item.unique_record_id || '无',
            title: item.Title || '无标题',
            author: item.First_Author || '未知作者',
            url: item.Identifier_URLs || ''
          }));
          const existIdSet = new Set(literatureList.map(item => item.id));
          let addNum = 0, skipNum = 0;
          newBatch.forEach(item => {
            if (!existIdSet.has(item.id)) {
              literatureList.push(item); existIdSet.add(item.id); addNum++;
            } else skipNum++;
          })
          localStorage.setItem(STORAGE_KEY, JSON.stringify(literatureList));
          showMsg(`导入完成：新增${addNum}篇，重复跳过${skipNum}篇，当前总库${literatureList.length}篇`, 'text-green-600 bg-green-5');
          currentPage = 1;
          renderTable();
        } catch (err) {
          showMsg('Excel解析失败，请检查表头是否匹配模板', 'text-red-600 bg-red-5');
          console.error(err);
        }
      }
      reader.readAsArrayBuffer(file);
    })

    searchDom.addEventListener('input', ()=>{currentPage=1; renderTable()});

    // 渲染分页表格
    function renderTable() {
      selectedIds.clear();
      checkAll.checked = false;
      const keyword = searchDom.value.trim().toLowerCase();
      const filterData = literatureList.filter(row => row.title.toLowerCase().includes(keyword));
      totalNum.textContent = `(${filterData.length}篇)`;
      tableBody.innerHTML = '';

      const totalPage = Math.ceil(filterData.length / pageSize) || 1;
      if(currentPage > totalPage) currentPage = totalPage;
      const start = (currentPage - 1) * pageSize;
      const pageData = filterData.slice(start, start + pageSize);

      prevPage.disabled = currentPage <= 1;
      nextPage.disabled = currentPage >= totalPage;
      pageInfo.textContent = `第${currentPage}/${totalPage}页`;

      if(filterData.length === 0){
        tableBody.innerHTML = `<tr><td colspan="6" class="text-center py-10 text-gray-400">${literatureList.length ===0?'文献库为空，请上传Excel':'未匹配到对应标题文献'}</td></tr>`;
        return;
      }

      pageData.forEach(row => {
        const tr = document.createElement('tr');
        tr.className = 'border-b border-gray-100';
        tr.innerHTML = `
          <td class="border border-gray-200 px-3 py-2 text-center">
            <input type="checkbox" class="row-check cursor-pointer" data-id="${row.id}">
          </td>
          <td class="border border-gray-200 px-3 py-2">${row.id}</td>
          <td class="border border-gray-200 px-3 py-2">${row.title}</td>
          <td class="border border-gray-200 px-3 py-2">${row.author}</td>
          <td class="border border-gray-200 px-3 break-all py-2 text-blue-600">
            ${row.url ? `<a href="${row.url}" target="_blank">外链</a>` : '无'}
          </td>
          <td class="border border-gray-200 px-3 py-2 text-center">
            <button onclick="downloadLibDoc('${JSON.stringify(row).replace(/'/g, "\\'")}')" class="bg-hospitalBlue text-white btn-normal">
              <i class="fa-solid fa-download mr-1"></i>下载文献
            </button>
          </td>
        `;
        tableBody.appendChild(tr);
      })

      document.querySelectorAll('.row-check').forEach(ck=>{
        ck.onchange = function(){
          const rid = this.dataset.id;
          if(this.checked) selectedIds.add(rid);
          else selectedIds.delete(rid);
        }
      })
    }

    function toggleAllCheck(){
      const allRowCheck = document.querySelectorAll('.row-check');
      allRowCheck.forEach(ck=> ck.checked = checkAll.checked);
      if(checkAll.checked){
        document.querySelectorAll('.row-check').forEach(item=>selectedIds.add(item.dataset.id))
      }else{
        selectedIds.clear();
      }
    }

    // 单行跳转川大图书馆下载
    window.downloadLibDoc = function (rawStr) {
      const data = JSON.parse(rawStr);
      const titleEncode = encodeURIComponent(data.title);
      const libUrl = `https://lib.scu.edu.cn/Search/Index?searchWord=${titleEncode}`;
      window.open(libUrl, '_blank');
      const content = `=====四川大学儿科睡眠科室文献存档=====
唯一ID：${data.id}
第一作者：${data.author}
文献标题：${data.title}
外部链接：${data.url || "无链接"}
图书馆地址：https://lib.scu.edu.cn`;
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const aTag = document.createElement('a');
      aTag.href = URL.createObjectURL(blob);
      aTag.download = `文献备份_${data.id}.txt`;
      aTag.click();
      URL.revokeObjectURL(aTag);
    }

    // 导出选中文献
    window.exportSelectedRows = function(){
      if(selectedIds.size === 0){
        showMsg("请先勾选需要下载的文献", 'text-red-600 bg-red-5');
        return;
      }
      const selectedList = literatureList.filter(item => selectedIds.has(item.id));
      const exportArr = selectedList.map(item=>({
        unique_record_id: item.id,
        Title: item.title,
        First_Author: item.author,
        Identifier_URLs: item.url
      }))
      const sheet = XLSX.utils.json_to_sheet(exportArr);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, sheet, "选中文献");
      XLSX.writeFile(wb, `选中文献_${new Date().getTime()}.xlsx`);
      showMsg(`成功导出选中${selectedList.length}条文献`, 'text-green-600 bg-green-5');
    }

    // 下载完整50列空白模板（和你上传的模板完全一致）
    window.downloadTemplate = function () {
      // 生成空行对象，所有50列都有
      const emptyRow = {};
      TEMPLATE_HEADERS.forEach(h => emptyRow[h] = '');
      // 第一行示例数据填充核心字段
      emptyRow.unique_record_id = '示例：DACT-00001';
      emptyRow.Title = '示例：填写文献完整标题';
      emptyRow.First_Author = '示例：第一作者姓名';
      emptyRow.Identifier_URLs = '示例：文献链接';

      const sheet = XLSX.utils.json_to_sheet([emptyRow], {header: TEMPLATE_HEADERS});
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, sheet, "导入模板");
      XLSX.writeFile(wb, "文献导入模板.xlsx");
      showMsg("模板下载成功，表头与系统标准模板完全一致", 'text-green-600 bg-green-5');
    }

    // 导出全部文献
    window.batchExportAllExcel = function () {
      if (literatureList.length === 0) {
        showMsg("文献库暂无数据，无法批量导出", 'text-red-600 bg-red-5');
        return;
      }
      const exportArr = literatureList.map(item => ({
        unique_record_id: item.id, Title: item.title, First_Author: item.author, Identifier_URLs: item.url
      }))
      const sheet = XLSX.utils.json_to_sheet(exportArr);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, sheet, "全部科室文献");
      XLSX.writeFile(wb, "科室文献总库_备份.xlsx");
      showMsg(`批量导出成功，共${literatureList.length}条文献`, 'text-green-600 bg-green-5');
    }

    // 清空数据
    window.clearAllData = function () {
      if (confirm('确认删除当前浏览器内所有科室文献？删除后无法恢复！')) {
        localStorage.removeItem(STORAGE_KEY);
        literatureList = [];
        currentPage = 1;
        renderTable();
        showMsg('本地文献库已全部清空', 'text-red-600 bg-red-5');
      }
    }

    function showMsg(text, className) {
      tipBox.className = `mt-4 py-2 px-3 rounded ${className}`;
      tipBox.classList.remove('hidden');
      setTimeout(() => tipBox.classList.add('hidden'), 4000);
    }
  </script>
</body>
</html>
